<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>抖音 UID 获取工具</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero">
        <div class="hero-badge">Douyin UID</div>
        <h1>抖音 UID 获取</h1>
        <p>粘贴抖音分享文本或短链接，自动提取 UID 信息。</p>
      </section>

      <section class="panel input-panel">
        <div class="panel-header">
          <div>
            <h2>输入抖音分享内容</h2>
            <p>支持完整分享文案，也支持单独的 `https://v.douyin.com/...` 链接。</p>
          </div>
          <button id="fillExampleButton" class="ghost-button" type="button">填入示例</button>
        </div>

        <label class="input-label" for="shareInput">分享文本 / 视频链接</label>
        <textarea id="shareInput" placeholder="例如：8.28 复制打开抖音，看看【声声的图文作品】打卡day1 ... https://v.douyin.com/VSrlMSTA1FM/ gbA:/ :2pm 03/03 X@M.Ji"></textarea>

        <div class="actions">
          <button id="parseButton" class="primary-button" type="button">开始获取</button>
          <button id="clearButton" class="secondary-button" type="button">清空</button>
        </div>
      </section>

      <section id="message" class="message hidden"></section>

      <section id="resultPanel" class="panel result-panel hidden">
        <div class="panel-header">
          <div>
            <h2>解析结果</h2>
          </div>
        </div>

        <div id="resultGrid" class="result-grid"></div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
