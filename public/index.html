<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>活动填表辅助工具</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero">
        <div class="hero-badge">📋 辅助填表</div>
        <h1>活动填表辅助工具</h1>
        <p>粘贴抖音分享文本，一键复制格式化行数据，直接粘贴到活动表格。</p>
      </section>

      <section class="panel input-panel">
        <div class="panel-header">
          <div>
            <h2>输入抖音分享内容</h2>
            <p>支持完整分享文案，也支持单独的 `https://v.douyin.com/...` 链接。</p>
          </div>
          <button id="fillExampleButton" class="ghost-button" type="button">填入示例</button>
        </div>

        <label class="input-label" for="nameInput">你的抖音名称</label>
        <input type="text" id="nameInput" class="name-input" placeholder="首次使用请填入你的抖音昵称，之后会自动记住" autocomplete="off" />

        <label class="input-label" for="shareInput">分享文本 / 视频链接</label>
        <textarea id="shareInput" placeholder="例如：8.28 复制打开抖音，看看【声声的图文作品】打卡day1 ... https://v.douyin.com/VSrlMSTA1FM/ gbA:/ :2pm 03/03 X@M.Ji"></textarea>

        <div class="actions">
          <button id="parseButton" class="primary-button" type="button">开始获取</button>
          <button id="clearButton" class="secondary-button" type="button">清空</button>
        </div>
      </section>

      <section id="message" class="message hidden"></section>

      <section id="resultPanel" class="panel result-panel hidden">
        <div class="panel-header">
          <div>
            <h2>解析结果</h2>
          </div>
          <button id="copyAllButton" class="copy-all-button" type="button" disabled>📋 一键复制整行</button>
        </div>

        <div id="resultGrid" class="result-grid"></div>

        <div class="copy-preview">
          <p class="copy-preview-label">复制预览（Tab 分隔，可直接粘贴到 Excel / 飞书表格）</p>
          <code id="copyPreview" class="copy-preview-code"></code>
        </div>
      </section>

      <footer class="privacy-notice">
        本工具仅用于辅助创作者参与官方活动时快捷填表，抖音名称仅保存在你的浏览器本地，不会上传到服务器。
      </footer>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
